<!DOCTYPE html>
<html>
<body>
    <h2>Weather in Gelephu</h2>
    <div id="weather-box">Loading weather...</div>

    <script>
        async function getWeather() {
            try {
                // Coordinates for Gelephu, Bhutan
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=26.93&longitude=90.48&current_weather=true');
                const data = await response.json();
                const temp = data.current_weather.temperature;
                const wind = data.current_weather.windspeed;
                
                document.getElementById('weather-box').innerHTML = `
                    <p><strong>Temperature:</strong> ${temp}°C</p>
                    <p><strong>Wind Speed:</strong> ${wind} km/h</p>
                `;
            } catch (error) {
                document.getElementById('weather-box').innerText = "Failed to load weather.";
            }
        }
        getWeather();
    </script>
</body>
</html>
